services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: procuva
      POSTGRES_PASSWORD: procuva
      POSTGRES_DB: procuva
    ports:
      - "5432:5432"
    volumes:
      - procuva_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U procuva -d procuva"]
      interval: 5s
      timeout: 5s
      retries: 10
  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://procuva:procuva@db:5432/procuva?schema=public
      AUTH_SECRET: change-this-in-production
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    ports:
      - "3000:3000"
volumes:
  procuva_pgdata:
